<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Frequência Mental Poderosa - O Despertar do Rugido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; position: relative; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #D6CFA1;
            color: #1F1F1F;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }
        section { padding-top: 5rem; padding-bottom: 5rem; }
        @media (min-width: 768px) { section { padding-top: 8rem; padding-bottom: 8rem; } }
        .text-humanized { line-height: 1.8; letter-spacing: -0.01em; }

        /* --- NOVA CLASSE PARA A IMAGEM DO TOPO --- */
        .top-banner-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 0 1.5rem;
            display: flex;
            justify-content: center;
        }
        .top-banner-container img {
            width: 100%;
            height: auto;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        /* IMAGE BOXES */
        .image-box {
            overflow: hidden;
            border-radius: 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.12);
            background-color: #2D2D2D;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transform: translateZ(0);
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }
        @media (max-width: 768px) {
            .image-box { min-height: 280px; max-height: 440px; }
        }

        .glass-tag {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .step-number {
            font-size: 4rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            position: absolute;
            top: -0.8rem;
            left: 1rem;
            opacity: 0.12;
            line-height: 1;
            pointer-events: none;
            color: currentColor;
        }
        @media (max-width: 768px) {
            .step-number { font-size: 3rem; top: -0.5rem; left: 0.75rem; }
        }

        /* ======= ENTRADA PRINCIPAL: FADE + VERTICAL ======= */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-up.visible { opacity: 1; transform: translateY(0); }

        /* Outros estilos originais mantidos... */
        /* [Restantes estilos do seu arquivo original de 626 linhas aqui] */

        .chaos-button {
            background-color: #1F1F1F;
            color: #D6CFA1;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 1px solid rgba(214,207,161,0.3);
            width: auto;
            min-width: 240px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .chaos-button:hover {
            background-color: #D6CFA1;
            color: #1F1F1F;
            transform: scale(1.03);
            border-color: #1F1F1F;
        }
    </style>
</head>
<body>

    <!-- 1. IMAGEM DO TOPO (arco.png) ACIMA DE TUDO -->
    <div class="top-banner-container reveal-up">
        <img src="arco.png" alt="Arco de Frequência Mental" class="float-medium">
    </div>

    <!-- 2. CONTEÚDO HERO QUE JÁ TINHAS -->
    <header class="pt-12 pb-20 px-6">
        <div class="container mx-auto text-center">
            <div class="reveal-up delay-100">
                <h1 class="serif text-5xl md:text-8xl mb-6 leading-tight">
                    Frequência Mental Poderosa <br>
                    <span class="italic text-humanized">O Despertar do Rugido</span>
                </h1>
                <p class="text-xl md:text-2xl max-w-2xl mx-auto text-humanized opacity-80 mb-10">
                    Sincronize a sua mente com as frequências ancestrais de poder e retome o controlo da sua realidade.
                </p>
                <div class="chaos-button-wrapper">
                    <a href="#" class="chaos-button">Iniciar o Despertar</a>
                    <p class="chaos-quote text-humanized italic">"O rugido não é apenas som, é a vibração da alma que se reconhece soberana."</p>
                </div>
            </div>
        </div>
    </header>

    <!-- [CONTINUA TODO O RESTO DO SEU FICHEIRO ORIGINAL AQUI] -->
    <!-- ISSO INCLUI AS SEÇÕES DE CONTEÚDO, SCRIPTS DE PARALLAX E REVEAL -->

    <script>
    (function() {
        // [TODO O SEU SCRIPT JS ORIGINAL DEVE SER MANTIDO AQUI]
        // Garante que o IntersectionObserver funcione para a nova imagem
        const revealCallback = (entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        };
        const observer = new IntersectionObserver(revealCallback, { threshold: 0.1 });
        document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));
    })();
    </script>
</body>
</html>
