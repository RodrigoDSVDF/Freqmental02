
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Frequência Mental Poderosa - O Despertar do Rugido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; position: relative; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #D6CFA1;
            color: #1F1F1F;
            scroll-behavior: smooth;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* --- ESTILOS DA IMAGEM DE TOPO (arco.png) --- */
        .hero-header {
            position: relative;
            background-color: #1a1a1a;
            min-height: 85vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .hero-image-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center right;
        }
        /* Gradiente para o texto não sumir sobre a imagem */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #1a1a1a 30%, rgba(26,26,26,0.5) 60%, transparent 100%);
            z-index: 2;
        }
        @media (max-width: 768px) {
            .hero-header { min-height: 70vh; }
            .hero-overlay {
                background: linear-gradient(to bottom, rgba(26,26,26,0.8) 0%, rgba(26,26,26,0.4) 50%, #1a1a1a 100%);
            }
            .hero-content { text-align: center; margin-top: auto; padding-bottom: 4rem; }
        }
        .hero-content { position: relative; z-index: 3; }
        /* --- FIM DOS ESTILOS DA IMAGEM --- */

        /* Estilos originais mantidos abaixo */
        .reveal-up { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.25, 0.8, 0.35, 1); }
        .reveal-up.visible { opacity: 1; transform: translateY(0); }
        .chaos-button {
            background-color: #D6CFA1;
            color: #1a1a1a;
            padding: 1rem 2.5rem;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- SEÇÃO DE TOPO COM A IMAGEM arco.png -->
    <header class="hero-header">
        <div class="hero-image-container">
            <img src="arco.png" alt="Arco de Frequência Mental">
            <div class="hero-overlay"></div>
        </div>

        <div class="container mx-auto px-6 hero-content">
            <div class="max-w-3xl reveal-up visible">
                <span class="text-amber-500 font-bold tracking-[0.3em] uppercase text-xs mb-4 block">
                    Frequência Mental Poderosa
                </span>
                <h1 class="serif text-white text-5xl md:text-8xl mb-6 leading-none">
                    O Despertar <br><span class="italic">do Rugido</span>
                </h1>
                <p class="text-stone-400 text-lg md:text-xl mb-10 max-w-lg leading-relaxed font-light">
                    Transforme sua vibração mental e acesse níveis de clareza e poder que você nunca imaginou serem possíveis.
                </p>
                <div class="flex flex-col sm:flex-row gap-5">
                    <a href="#conteudo" class="chaos-button">Começar Agora</a>
                    <a href="#" class="text-white border border-white/20 px-8 py-4 hover:bg-white/10 transition text-sm font-bold tracking-widest flex items-center justify-center">
                        Assistir Intro
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- PONTO DE ANCORAGEM PARA O CONTEÚDO -->
    <main id="conteudo">
        <!-- O resto do seu código original continua aqui -->
    </main>

    <script>
        // Script simplificado para ativar animações ao carregar
        window.addEventListener('load', () => {
            document.querySelectorAll('.reveal-up').forEach(el => {
                el.classList.add('visible');
            });
        });
    </script>
</body>
</html>
