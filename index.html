
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Frequência Mental Poderosa - O Despertar do Rugido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; position: relative; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #D6CFA1;
            color: #1F1F1F;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }
        section { padding-top: 5rem; padding-bottom: 5rem; }
        @media (min-width: 768px) { section { padding-top: 8rem; padding-bottom: 8rem; } }
        .text-humanized { line-height: 1.8; letter-spacing: -0.01em; }

        /* IMAGE BOXES */
        .image-box {
            overflow: hidden;
            border-radius: 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.12);
            background-color: #2D2D2D;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transform: translateZ(0);
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }
        @media (max-width: 768px) {
            .image-box { min-height: 280px; max-height: 440px; }
        }

        .glass-tag {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .step-number {
            font-size: 4rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            position: absolute;
            top: -0.8rem;
            left: 1rem;
            opacity: 0.12;
            line-height: 1;
            pointer-events: none;
            color: currentColor;
        }
        @media (max-width: 768px) {
            .step-number { font-size: 3rem; top: -0.5rem; left: 0.75rem; }
        }

        /* ======= ENTRADA PRINCIPAL: FADE + VERTICAL ======= */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-up.visible { opacity: 1; transform: translateY(0); }

        /* ENTRADA DA ESQUERDA */
        .reveal-left {
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-left.visible { opacity: 1; transform: translateX(0); }

        /* ENTRADA DA DIREITA */
        .reveal-right {
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-right.visible { opacity: 1; transform: translateX(0); }

        /* ENTRADA DIAGONAL */
        .reveal-diag-left {
            opacity: 0;
            transform: translateX(-30px) translateY(20px);
            transition: opacity 1.1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1.1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-diag-left.visible { opacity: 1; transform: translateX(0) translateY(0); }

        .reveal-diag-right {
            opacity: 0;
            transform: translateX(30px) translateY(20px);
            transition: opacity 1.1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1.1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-diag-right.visible { opacity: 1; transform: translateX(0) translateY(0); }

        /* SCALE REVEAL */
        .reveal-scale {
            opacity: 0;
            transform: scale(0.95) translateY(16px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-scale.visible { opacity: 1; transform: scale(1) translateY(0); }

        /* DELAYS */
        .delay-100 { transition-delay: 0.1s; }
        .delay-200 { transition-delay: 0.2s; }
        .delay-300 { transition-delay: 0.3s; }
        .delay-400 { transition-delay: 0.4s; }
        .delay-500 { transition-delay: 0.5s; }

        /* PARALLAX IMAGENS — via JS */
        .parallax-img { will-change: transform; }

        /* FLOATING ELEMENTS */
        .float-slow {
            animation: floatSlow 7s ease-in-out infinite;
        }
        .float-medium {
            animation: floatMedium 5s ease-in-out infinite;
        }
        .float-orbit {
            animation: orbit 9s ease-in-out infinite;
        }
        @keyframes floatSlow {
            0%   { transform: translateY(0px) translateX(0px); }
            33%  { transform: translateY(-7px) translateX(4px); }
            66%  { transform: translateY(-3px) translateX(-5px); }
            100% { transform: translateY(0px) translateX(0px); }
        }
        @keyframes floatMedium {
            0%   { transform: translateY(0px) translateX(0px) rotate(0deg); }
            50%  { transform: translateY(-8px) translateX(5px) rotate(1deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
        }
        @keyframes orbit {
            0%   { transform: translateX(0px) translateY(0px); }
            25%  { transform: translateX(8px) translateY(-5px); }
            50%  { transform: translateX(0px) translateY(-10px); }
            75%  { transform: translateX(-7px) translateY(-4px); }
            100% { transform: translateX(0px) translateY(0px); }
        }

        /* SCROLL-DRIVEN HORIZONTAL (cards) */
        .scroll-slide { will-change: transform; }

        /* MARQUEE horizontal */
        .marquee-track {
            display: flex;
            gap: 4rem;
            animation: marquee 18s linear infinite;
            white-space: nowrap;
        }
        @keyframes marquee {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* TEXTO HERO — palavras entram individualmente */
        .word-reveal span {
            display: inline-block;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
        }
        .word-reveal.visible span { opacity: 1; transform: translateY(0); }

        /* BOTÃO MOBILE */
        .chaos-button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 2rem;
            width: 100%;
        }
        .chaos-button {
            background-color: #1F1F1F;
            color: #D6CFA1;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 1px solid rgba(214,207,161,0.3);
            width: auto;
            min-width: 240px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .chaos-button:hover {
            background-color: #D6CFA1;
            color: #1F1F1F;
            transform: scale(1.03);
            border-color: #1F1F1F;
        }
        .chaos-quote {
            margin-top: 1rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1rem;
            line-height: 1.5;
            color: #2D2D2D;
            max-width: 320px;
            font-weight: 500;
            letter-spacing: -0.01em;
            padding: 0 1rem;
        }
        .chaos-author {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #4A4A4A;
            font-weight: 400;
        }

        /* Estilos para a seção Hero */
        .hero-section {
            background-image: url('https://canalestoico.com.br/wp-content/uploads/2024/10/D1-33.webp');
            background-attachment: fixed; /* Para efeito parallax nativo do CSS */
        }

        /* Estilos para a imagem flutuante do livro */
        .floating-book {
            position: absolute;
            top: 50%;
            right: 10%; /* Ajuste conforme necessário para posicionamento */
            transform: translateY(-50%);
            animation: floatMedium 5s ease-in-out infinite; /* Reutiliza a animação existente */
            z-index: 10; /* Garante que fique acima de outros elementos */
        }

        @media (max-width: 768px) {
            .floating-book {
                position: relative;
                top: auto;
                right: auto;
                transform: none;
                margin-top: 2rem;
                animation: none; /* Desativa a animação em mobile se não for desejado */
            }
        }

        /* Adicionar a funcionalidade de revelação para os novos elementos */
        .reveal-up, .reveal-diag-right {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.25, 0.8, 0.35, 1), transform 1s cubic-bezier(0.25, 0.8, 0.35, 1);
        }
        .reveal-up.visible, .reveal-diag-right.visible { opacity: 1; transform: translateY(0); }

        .delay-100 { transition-delay: 0.1s; }
        .delay-200 { transition-delay: 0.2s; }
        .delay-300 { transition-delay: 0.3s; }
        .delay-400 { transition-delay: 0.4s; }
        .delay-500 { transition-delay: 0.5s; }

    </style>
    <script>
        // Seu código JavaScript existente
        (function() {
            const isMobile = window.innerWidth < 768;

            // Adicionar a funcionalidade de revelação para os novos elementos
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('[class*="reveal-"]').forEach(el => {
                observer.observe(el);
            });

            // Adicionar parallax para a imagem de fundo da seção hero (opcional, se quiser um efeito mais avançado)
            const heroSection = document.querySelector('.hero-section');
            if (heroSection && !isMobile) {
                window.addEventListener('scroll', () => {
                    const scrollY = window.scrollY;
                    heroSection.style.backgroundPositionY = `calc(0% + ${scrollY * 0.2}px)`; // Ajuste o 0.2 para controlar a velocidade do parallax
                }, { passive: true });
            }

            if (!isMobile) {
                const parallaxImages = document.querySelectorAll('.parallax-img');
                function updateParallax() {
                    const vh = window.innerHeight;
                    parallaxImages.forEach(img => {
                        const rect = img.getBoundingClientRect();
                        if (rect.bottom < 0 || rect.top > vh) return;
                        const center = rect.top + rect.height / 2 - vh / 2;
                        const moveY = Math.max(-12, Math.min(12, center * 0.04));
                        img.style.transform = `translateY(${moveY}px)`;
                    });
                }
                window.addEventListener('scroll', updateParallax, { passive: true });
                updateParallax();
            }

            /* ---- PARALLAX HORIZONTAL NOS CARDS DOS 3 PILARES ---- */
            if (!isMobile) {
                const cards = document.querySelectorAll('.scroll-slide');
                const offsets = [-14, 0, 14]; // esq, centro, dir
                function updateCards() {
                    cards.forEach((card, i) => {
                        const rect = card.getBoundingClientRect();
                        const vh = window.innerHeight;
                        if (rect.bottom < 0 || rect.top > vh) return;
                        const prog = Math.min(1, Math.max(0, (vh - rect.top) / (vh + rect.height)));
                        // mapeia de 0→1 para deslocamento -offset → 0
                        const eased = prog * (2 - prog); // ease out quad
                        const moveX = offsets[i] * (1 - eased);
                        card.style.transform = `translateX(${moveX}px) translateY(${card.classList.contains('visible') ? 0 : 0}px)`;
                    });
                }
                window.addEventListener('scroll', updateCards, { passive: true });
                updateCards();
            }

            /* ---- SCROLL RÁPIDO PARALAX NOS BLOBS DO HERO ---- */
            if (!isMobile) {
                const blobs = document.querySelectorAll('.float-slow, .float-medium, .float-orbit');
                // Mantém a animação CSS; só adicionamos leve offset por scroll
                window.addEventListener('scroll', () => {
                    const sy = window.scrollY;
                    blobs.forEach((b, i) => {
                        const speed = i % 2 === 0 ? 0.04 : -0.025;
                        b.style.marginTop = (sy * speed) + 'px';
                    });
                }, { passive: true });
            }

            /* ---- SUAVE ANCHOR LINKS ---- */
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    const id = this.getAttribute('href');
                    if (!id || id === '#') return;
                    const target = document.querySelector(id);
                    if (target) {
                        e.preventDefault();
                        window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - 20, behavior: 'smooth' });
                    }
                });
            });

            /* ---- MAGNETIC HOVER NOS BOTÕES (desktop) ---- */
            if (!isMobile) {
                document.querySelectorAll('a[href*="freqmentalchat"], a[href*="pdf"]').forEach(btn => {
                    btn.addEventListener('mousemove', (e) => {
                        const r = btn.getBoundingClientRect();
                        const dx = (e.clientX - r.left - r.width / 2) * 0.08;
                        const dy = (e.clientY - r.top - r.height / 2) * 0.08;
                        btn.style.transform = `translate(${dx}px, ${dy}px) scale(1.02)`;
                    });
                    btn.addEventListener('mouseleave', () => {
                        btn.style.transform = '';
                    });
                });
            }
        })();
    </script>
</body>
</html>
